name: watermark-vault

services:
  watermark-vault:
    container_name: watermark-vault
    image: ghcr.io/zzm6899/watermark-vault:latest
    restart: unless-stopped
    ports:
      - protocol: tcp
        published: 5066
        target: 5066
    environment:
      - TZ=Australia/Sydney
      - PUBLIC_SITE_HOSTS=${PUBLIC_SITE_HOSTS:-zacmclients.photos,www.zacmclients.photos}
      - APP_HOSTS=${APP_HOSTS:-book.zacmclients.photos}
      - ZIP_READY_TTL_MS=${ZIP_READY_TTL_MS:-900000}
      - ZIP_TRANSFERRED_TTL_MS=${ZIP_TRANSFERRED_TTL_MS:-120000}
      # ── Super Admin (Overall Owner) ─────────────────────────────────────────
      # Set these to bootstrap the super admin account on first run.
      # The super admin can view ALL tenant data, manage license plans, and issue keys.
      # Change the password immediately after first login.
      - SUPER_ADMIN_USERNAME=${SUPER_ADMIN_USERNAME:-admin}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:?Set SUPER_ADMIN_PASSWORD in .env before starting}
      # ── Email (SMTP) ─────────────────────────────────────────────────────────
      - EMAIL_FROM=${EMAIL_FROM:-Zac <zacmorganphotography@gmail.com>}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-smtp.gmail.com}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_SECURE=${EMAIL_SERVER_SECURE:-false}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      # ── Stripe ───────────────────────────────────────────────────────────────
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # ── Google Integrations ───────────────────────────────────────────────────
      - GOOGLE_API_CREDENTIALS=${GOOGLE_API_CREDENTIALS:-}
    volumes:
      - /mnt/your-pool/apps/booking-gal/data:/data
