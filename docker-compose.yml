name: watermark-vault

services:
  watermark-vault:
    container_name: watermark-vault
    image: ghcr.io/zzm6899/watermark-vault:latest
    restart: unless-stopped
    ports:
      - protocol: tcp
        published: 5066
        target: 5066
    environment:
      - TZ=Australia/Sydney
      # ── Super Admin (Overall Owner) ─────────────────────────────────────────
      # Set these to bootstrap the super admin account on first run.
      # The super admin can view ALL tenant data, manage license plans, and issue keys.
      # Change the password immediately after first login.
      - SUPER_ADMIN_USERNAME=admin
      - SUPER_ADMIN_PASSWORD=changeme
      # ── Email (SMTP) ─────────────────────────────────────────────────────────
      - EMAIL_FROM=Zac <zacmorganphotography@gmail.com>
      - EMAIL_SERVER_HOST=smtp.gmail.com
      - EMAIL_SERVER_PORT=587
      - EMAIL_SERVER_SECURE=false
      - EMAIL_SERVER_USER=zacmorganphotography@gmail.com
      - EMAIL_SERVER_PASSWORD=YOUR_APP_PASSWORD_HERE
      # ── Stripe ───────────────────────────────────────────────────────────────
      - STRIPE_SECRET_KEY=sk_live_YOUR_KEY_HERE
      - STRIPE_PUBLISHABLE_KEY=pk_live_YOUR_KEY_HERE
      - STRIPE_WEBHOOK_SECRET=whsec_YOUR_WEBHOOK_SECRET_HERE
      # ── Google Integrations ───────────────────────────────────────────────────
      - GOOGLE_API_CREDENTIALS={"web":{"client_id":"YOUR_CLIENT_ID","client_secret":"YOUR_SECRET","redirect_uris":["https://book.zacmclients.photos/api/integrations/googlecalendar/callback"]}}
    volumes:
      - /mnt/your-pool/apps/booking-gal/data:/data
